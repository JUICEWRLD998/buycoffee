<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buy Coffee App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>Buy Coffee App</h1>
    <p class="subtitle">Simple frontend for future smart contract integration.</p>

    <section class="card">
      <h2>Wallet Actions</h2>
      <div class="button-row">
        <button id="connectBtn" type="button">Connect</button>
        <button id="balanceBtn" type="button">Get Balance</button>
        <button id="withdrawBtn" type="button">Withdraw</button>
      </div>
      <p id="walletStatus" class="status">Wallet not connected.</p>
    </section>

    <section class="card">
      <h2>Buy Coffee</h2>
      <form id="coffeeForm">
        <label for="name">Name</label>
        <input id="name" name="name" type="text" placeholder="Your name" required>

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="3" placeholder="Say something nice"></textarea>

        <label for="amount">Coffee Amount (ETH)</label>
        <input id="amount" name="amount" type="number" step="0.001" min="0.001" value="0.001" required>

        <button id="buyBtn" type="submit">Buy Coffee</button>
      </form>
    </section>

    <section class="card">
      <h2>Activity</h2>
      <ul id="activityList"></ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
